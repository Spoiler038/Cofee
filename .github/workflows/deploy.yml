- name: Generate config.js with token
        env:
          TOKEN_PWA: ${{ secrets.TOKEN_PWA }}
        run: |
          echo "const GITHUB_TOKEN = '${TOKEN_PWA}';" > config.js
          echo "--- config.js content (first 30 chars) ---"
          head -c 30 config.js
          echo ""
          echo "--- file exists check ---"
          ls -la config.js

      - name: Verify config.js before deploy
        run: ls -la config.js && echo "File is ready for deploy"
