name: Deploy PWA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Inject GitHub Token
        run: |
          # Проверяем, есть ли токен
          if [ -z "${{ secrets.TOKEN_PWA }}" ]; then
            echo "❌ Токен не найден! Проверьте секрет TOKEN_PWA"
            exit 1
          fi
          echo "✅ Токен найден, заменяем плейсхолдер..."
          # Экранируем специальные символы в токене
          ESCAPED_TOKEN=$(echo "${{ secrets.TOKEN_PWA }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|__GITHUB_TOKEN_PLACEHOLDER__|${ESCAPED_TOKEN}|g" index.html
          echo "✅ Замена выполнена"
      
      - name: Verify token replacement
        run: |
          if grep -q "__GITHUB_TOKEN_PLACEHOLDER__" index.html; then
            echo "❌ Плейсхолдер не заменился!"
            exit 1
          else
            echo "✅ Плейсхолдер успешно заменён"
          fi
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
